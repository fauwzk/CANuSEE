name: PlatformIO CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
          
      -   uses: actions/setup-python@v5
          with:
            python-version: '3.11'
          
      -   name: Install PlatformIO
          run: pip install --upgrade platformio
          
      -   name: Get short SHA
          id: sha
          run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          
      #   Cette étape génère automatiquement le fichier version.h avant la compilation
      - name: Generate version.h dynamically
        run: |
          mkdir -p include
          echo "#pragma once" > include/version.h
          echo "#define FW_VERSION \"${{ steps.sha.outputs.short }}\"" >> include/version.h
          echo "#define BUILD_DATE \"$(date +'%Y-%m-%d')\"" >> include/version.h
          
      -   name: Clean previous build
          run: pio run -t clean
          
      -   name: Build firmware
          run: pio run -e esp32c3 -v
          
      -   name: Build LittleFS
          run: pio run -e esp32c3 -t buildfs
          
      -   name: Prepare release artifacts
          run: |
            mkdir -p release
            cp .pio/build/esp32c3/firmware.bin release/firmware-${{ steps.sha.outputs.short }}.bin
            cp .pio/build/esp32c3/littlefs.bin release/littlefs-${{ steps.sha.outputs.short }}.bin

      -   name: Create zip release
          run: |
            cd release
            zip firm_fs-${{ steps.sha.outputs.short }}.zip firmware-${{ steps.sha.outputs.short }}.bin littlefs-${{ steps.sha.outputs.short }}.bin
          
      -   name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ steps.sha.outputs.short }}
            name: Build ${{ steps.sha.outputs.short }}
            files: release/*.zip
          
      -   name: Send Discord Webhook
          env:
            DISCORD_WEBHOOK: ${{ secrets.DISCORD_SECRET }}
          run: |
            BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.sha.outputs.short }}"
            FW_URL="$BASE_URL/firmware-${{ steps.sha.outputs.short }}.bin"
            FS_URL="$BASE_URL/littlefs-${{ steps.sha.outputs.short }}.bin"
            ZIP_URL="$BASE_URL/firm_fs-${{ steps.sha.outputs.short }}.zip"
          
            curl -H "Content-Type: application/json" \
                 -d "{
                   \"username\": \"GitHub Actions\",
                   \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
                   \"embeds\": [{
                     \"title\": \"🚀 New ESP32 Build Ready: ${{ steps.sha.outputs.short }}\",
                     \"color\": 5814783,
                     \"description\": \"The latest firmware and filesystem binaries have been compiled and attached to the release.\",
                     \"fields\": [
                       {
                         \"name\": \"Firmware\",
                         \"value\": \"[⬇️ Download Firmware.bin]($FW_URL)\",
                         \"inline\": true
                       },
                       {
                         \"name\": \"LittleFS\",
                         \"value\": \"[⬇️ Download LittleFS.bin]($FS_URL)\",
                         \"inline\": true
                       },
                       {
                         \"name\": \"Archive\",
                         \"value\": \"[📦 Download ZIP]($ZIP_URL)\",
                         \"inline\": false
                       }
                     ]
                   }]
                 }" \
                 $DISCORD_WEBHOOK
                    