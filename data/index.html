<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CANuSEE Config</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            transition: max-width 0.3s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-row:last-child {
            border-bottom: none;
        }

        input[type="number"],
        select {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            width: 115px;
            text-align: center;
        }

        input[type="number"]:focus,
        select:focus {
            border-color: var(--accent);
            outline: none;
        }

        button,
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--accent);
        }

        .btn-secondary {
            background-color: var(--border);
            margin-top: 0;
        }

        .btn-success {
            background-color: var(--success);
            margin-top: 0;
        }

        .btn-danger {
            background-color: var(--danger);
        }

        .sticky-save {
            position: sticky;
            bottom: 20px;
            z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .container {
                max-width: 900px;
            }

            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                align-items: start;
            }

            .card-global {
                grid-column: span 2;
            }

            .action-buttons {
                flex-direction: row;
            }

            .action-buttons .btn {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>CANuSEE Config</h2>

        <div class="cards-grid">
            <form action="/save" method="post" id="config-form" style="display: contents;">

                <div class="card card-global">
                    <h3>⚙️ Paramètres Globaux</h3>
                    <div class="form-row">
                        <label>Gauge Ticks</label>
                        <input type="number" min="0" max="6" step="1" name="ticks" value="%TICKS%">
                    </div>
                    <div class="form-row">
                        <label>Luminosité OLED</label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="range" min="0" max="100" step="1" name="brightness" value="%BRIGHTNESS_PCT%"
                                oninput="document.getElementById('bright_val').innerText = this.value + '%'">
                            <span id="bright_val"
                                style="width: 40px; text-align: right; font-weight: bold; color: var(--accent);">
                                %BRIGHTNESS_PCT%%
                            </span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3>Écran 1 : Pression Turbo</h3>
                    <div class="form-row">
                        <label>Min Boost (bar)</label>
                        <input type="number" step="0.01" name="boost_min" value="%MIN%">
                    </div>
                    <div class="form-row">
                        <label>Max Boost (bar)</label>
                        <input type="number" step="0.01" name="boost_max" value="%MAX%">
                    </div>
                    <div class="form-row">
                        <label>Affichage</label>
                        <select name="boost_gauge_type">
                            <option value="0" %SELECTED_BOOST_TEXT%>Texte</option>
                            <option value="1" %SELECTED_BOOST_GAUGE%>Graphique</option>
                            <option value="2" %SELECTED_BOOST_DIAL%>Cadran Rond</option>
                            <option value="3" %SELECTED_BOOST_BAR%>Barre Segments</option>
                        </select>
                    </div>
                </div>

                <div class="card">
                    <h3>Écran 2 : Temp. Admission (IAT)</h3>
                    <div class="form-row">
                        <label>Affichage</label>
                        <select name="iat_gauge_type">
                            <option value="0" %SELECTED_IAT_TEXT%>Texte</option>
                            <option value="1" %SELECTED_IAT_GAUGE%>Graphique</option>
                            <option value="2" %SELECTED_IAT_DIAL%>Cadran Rond</option>
                            <option value="3" %SELECTED_IAT_BAR%>Barre Segments</option>
                        </select>
                    </div>
                </div>

                <div class="card">
                    <h3>Écran 3 : Charge Moteur</h3>
                    <div class="form-row">
                        <label>Affichage</label>
                        <select name="engload_gauge_type">
                            <option value="0" %SELECTED_LOAD_TEXT%>Texte</option>
                            <option value="1" %SELECTED_LOAD_GAUGE%>Graphique</option>
                            <option value="2" %SELECTED_LOAD_DIAL%>Cadran Rond</option>
                            <option value="3" %SELECTED_LOAD_BAR%>Barre Segments</option>
                        </select>
                    </div>
                </div>

                <div class="card">
                    <h3>Écran 5 : Temp. LdR</h3>
                    <div class="form-row">
                        <label>Affichage</label>
                        <select name="coolant_gauge_type">
                            <option value="0" %SELECTED_COOLANT_TEXT%>Texte</option>
                            <option value="1" %SELECTED_COOLANT_GAUGE%>Graphique</option>
                            <option value="2" %SELECTED_COOLANT_DIAL%>Cadran Rond</option>
                            <option value="3" %SELECTED_COOLANT_BAR%>Barre Segments</option>
                        </select>
                    </div>
                </div>

                <div class="card">
                    <h3>Écran 8 : Chronomètre</h3>
                    <div class="form-row">
                        <label>Target Speed (km/h)</label>
                        <input type="number" min="0" max="300" step="10" name="max_speed" value="%MAX_SPEED%">
                    </div>
                </div>

            </form>

        </div>

        <button type="submit" form="config-form" class="btn-primary sticky-save">💾 Save Settings</button>

        <div class="card">
            <h3>🛠️ System Actions</h3>
            <div class="action-buttons">
                <a href="/nextpage" class="btn btn-secondary">Next Screen ➔</a>
                <a href="/update" class="btn btn-success">⬇️ OTA Update</a>
                <a href="/reset" class="btn btn-danger">⚠️ Restart</a>
            </div>
        </div>
    </div>
</body>

</html>
