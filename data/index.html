<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CANuSEE Config</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            transition: max-width 0.3s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-row:last-child {
            border-bottom: none;
        }

        input[type="number"],
        select {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            width: 110px;
            text-align: center;
        }

        input[type="number"]:focus,
        select:focus {
            border-color: var(--accent);
            outline: none;
        }

        button,
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--accent);
        }

        .btn-secondary {
            background-color: var(--border);
            margin-top: 0;
        }

        .btn-success {
            background-color: var(--success);
            margin-top: 0;
        }

        .btn-danger {
            background-color: var(--danger);
        }

        .sticky-save {
            position: sticky;
            bottom: 20px;
            z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Style spécifique pour la simulation OLED */
        .oled-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        canvas {
            width: 100%;
            max-width: 256px;
            /* Taille double (128x64 * 2) pour visibilité */
            height: auto;
            image-rendering: pixelated;
            /* Look rétro */
            border: 1px solid #333;
        }

        @media (min-width: 768px) {
            .container {
                max-width: 900px;
            }

            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                align-items: start;
            }

            .card-preview {
                grid-column: span 2;
            }

            /* Le preview prend toute la largeur en haut */
            .card-display-modes {
                grid-row: span 3;
            }

            .action-buttons {
                flex-direction: row;
            }

            .action-buttons .btn {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>CANuSEE Config</h2>

        <div class="cards-grid">

            <div class="card card-preview">
                <h3>📺 Live OLED Preview</h3>
                <div class="oled-container">
                    <canvas id="oled-sim" width="128" height="64"></canvas>
                </div>
                <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 10px;">
                    Rafraîchissement: 1s (Dépendant du Wi-Fi)
                </p>
            </div>

            <div class="card">
                <h3>⚙️ Turbo Limits</h3>
                <form action="/save" method="post" id="config-form">
                    <div class="form-row">
                        <label>Min Boost (bar)</label>
                        <input type="number" step="0.01" name="boost_min" value="%MIN%">
                    </div>
                    <div class="form-row">
                        <label>Max Boost (bar)</label>
                        <input type="number" step="0.01" name="boost_max" value="%MAX%">
                    </div>
            </div>

            <div class="card card-display-modes">
                <h3>🖥️ Display Modes</h3>
                <div class="form-row"><label>Boost Display</label><select name="boost_gauge_type">
                        <option value="0" %SELECTED_BOOST_TEXT%>Text</option>
                        <option value="1" %SELECTED_BOOST_GAUGE%>Gauge</option>
                    </select></div>
                <div class="form-row"><label>Engine Load</label><select name="engload_gauge_type">
                        <option value="0" %SELECTED_LOAD_TEXT%>Text</option>
                        <option value="1" %SELECTED_LOAD_GAUGE%>Gauge</option>
                    </select></div>
                <div class="form-row"><label>Battery Voltage</label><select name="voltage_gauge_type">
                        <option value="0" %SELECTED_VOLTAGE_TEXT%>Text</option>
                        <option value="1" %SELECTED_VOLTAGE_GAUGE%>Gauge</option>
                    </select></div>
                <div class="form-row"><label>Coolant Temp</label><select name="coolant_gauge_type">
                        <option value="0" %SELECTED_COOLANT_TEXT%>Text</option>
                        <option value="1" %SELECTED_COOLANT_GAUGE%>Gauge</option>
                    </select></div>
                <div class="form-row"><label>Intake Air Temp</label><select name="iat_gauge_type">
                        <option value="0" %SELECTED_IAT_TEXT%>Text</option>
                        <option value="1" %SELECTED_IAT_GAUGE%>Gauge</option>
                    </select></div>
            </div>

            <div class="card">
                <h3>🎨 Gauge & Timer</h3>
                <div class="form-row"><label>Gauge Ticks</label><input type="number" min="0" max="6" step="1"
                        name="ticks" value="%TICKS%"></div>
                <div class="form-row"><label>Target Speed</label><input type="number" min="0" max="300" step="10"
                        name="max_speed" value="%MAX_SPEED%"></div>
            </div>

        </div>

        <button type="submit" form="config-form" class="btn-primary sticky-save">💾 Save Settings</button>
        </form>

        <div class="card">
            <h3>🛠️ System Actions</h3>
            <div class="action-buttons">
                <a href="/nextpage" class="btn btn-secondary">Next Screen ➔</a>
                <a href="/update" class="btn btn-success">⬇️ OTA Update</a>
                <a href="/reset" class="btn btn-danger">⚠️ Restart</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('oled-sim');
        const ctx = canvas.getContext('2d');
        const screenNames = ["Pression MAF", "Pression Turbo", "Temp admission", "Charge moteur", "Tension Bat", "Temp LdR", "DTC Codes", "Dash", "Timer", "Speed"];
        const units = ["kPa", "Bar", "°C", "%", "V", "°C", "", "", "", "km/h"];

        // Fonction d'aide pour centrer le texte
        function drawCenterText(text, y) {
            const width = ctx.measureText(text).width;
            ctx.fillText(text, 64 - (width / 2), y);
        }

        // Dessin du bandeau du bas (BottomText)
        function drawBottomBar(screenIndex) {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 48, 128, 16);
            ctx.fillStyle = "black";
            ctx.font = "10px monospace";
            drawCenterText("CANuSEE Web", 60);

            // Draw page number
            ctx.fillText((screenIndex + 1) + "/10", 2, 60);
        }

        // Fonction principale de dessin
        function renderOLED(data) {
            // Fond noir
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 128, 64);

            // Variables selon l'écran
            let title = screenNames[data.screen] || "Unknown";
            let value = 0.0;
            let unit = units[data.screen] || "";

            switch (data.screen) {
                case 0: value = data.maf; break;
                case 1: value = data.boost; break;
                case 2: value = data.iat; break;
                case 3: value = data.load; break;
                case 4: value = data.battery; break;
                case 5: value = data.coolant; break;
                case 9: value = data.speed; break;
            }

            // Dessin de l'interface "Texte" standard
            ctx.fillStyle = "white";
            ctx.font = "12px sans-serif";
            drawCenterText(title, 16);

            ctx.font = "bold 18px sans-serif";
            let valStr = Number(value).toFixed(1);
            if (data.screen >= 0 && data.screen <= 5 || data.screen == 9) {
                drawCenterText(valStr + " " + unit, 40);
            } else {
                drawCenterText("Voir ESP32", 40); // Pour les écrans complexes (Dash/Timer)
            }

            drawBottomBar(data.screen);
        }

        // Boucle de rafraîchissement (polling)
        async function fetchState() {
            try {
                const response = await fetch('/api/state');
                const data = await response.json();
                renderOLED(data);
            } catch (err) {
                console.log("Waiting for ESP32...");
                // Affichage d'erreur sur l'OLED virtuel
                ctx.fillStyle = "black"; ctx.fillRect(0, 0, 128, 64);
                ctx.fillStyle = "white"; ctx.font = "12px sans-serif";
                drawCenterText("Offline / Fetching...", 32);
            }
        }

        // Initialisation et boucle (1000ms)
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, 128, 64);
        ctx.fillStyle = "white"; ctx.font = "12px sans-serif";
        drawCenterText("Connecting...", 32);

        setInterval(fetchState, 1000);
        fetchState(); // Premier appel immédiat
    </script>
</body>

</html>
